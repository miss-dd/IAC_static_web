name: Deploy Restaurant Website

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  TF_VERSION: 1.7.0

jobs:
  deploy:
    name: Terraform + S3 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="bucket_name=${{ secrets.S3_BUCKET_NAME }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="github_username=${{ secrets.GH_USERNAME }}" \
            -var="github_repo=${{ secrets.GH_REPO }}" \
            -var="tfstate_bucket_name=${{ secrets.TFSTATE_BUCKET_NAME }}"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="bucket_name=${{ secrets.S3_BUCKET_NAME }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="github_username=${{ secrets.GH_USERNAME }}" \
            -var="github_repo=${{ secrets.GH_REPO }}" \
            -var="tfstate_bucket_name=${{ secrets.TFSTATE_BUCKET_NAME }}"

      - name: Deploy website files to S3
        run: |
          aws s3 sync website/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=3600"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Print website URL
        run: |
          echo "✅ Deployment complete!"
          echo "🌍 Live at: https://$(aws cloudfront get-distribution \
            --id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text)"
